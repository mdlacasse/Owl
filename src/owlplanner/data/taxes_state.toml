# State income tax data for Owl retirement planner (2026 basis).
#
# Adapted from drawdowncalc (https://github.com/hubcity/drawdowncalc) and
# extended with retirement income exemption caps, SS phase-out thresholds,
# pension-specific exemptions, and age requirements.
#
# Fields:
#   brackets                  = [[lower_income, rate_pct], ...]
#                               rate_pct in percent (e.g. 5.35 = 5.35%).
#                               Lower bound where that marginal rate begins.
#                               Last entry has no upper bound.
#   standard_deduction        = dollar amount (not inflation-adjusted in file;
#                               Owl applies gamma_n scaling at runtime)
#   tax_social_security       = true/false — whether state taxes SS benefits at all
#   ss_exemption_threshold    = AGI below which SS is fully exempt (0 = not applicable).
#                               Only meaningful when tax_social_security = true.
#   retirement_income_exemption = dollar cap per person for IRA/pension income:
#                                 0   = fully taxed (no exemption)
#                                -1   = fully exempt (IL, PA, MS, IA...)
#                                N>0  = dollar cap per person (NY=$20k, CO=$24k...)
#   exemption_age             = minimum age to qualify for retirement_income_exemption
#                               (0 = no age requirement)
#   pension_exemption         = additional dollar cap applying only to defined-benefit
#                               pension income (0 = use retirement_income_exemption for all)
#
# Sources: DDC reference/taxes_state.toml (2026 basis, AI-generated), supplemented
# with state DOR publications. Approximate for states with complex phase-outs.

