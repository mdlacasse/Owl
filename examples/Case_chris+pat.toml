case_name = "chris+pat"
description = """
Chris and Pat are a married couple in their early sixties, a few years from retirement.
Chris, the older of the two, wraps up a career in engineering at the end of 2026 at age 63,
while Pat, a marketing professional, continues working through 2028, retiring at 62.
They own their home outright and plan to leave it to their heirs.

Their nest egg is spread across taxable, traditional IRA, and Roth accounts, with the bulk
in Chris's traditional IRA—a reflection of decades of 401(k) contributions. Owl will
optimize Roth conversions in the early retirement years, before Social Security and RMDs
begin, to reduce long-term tax exposure. Chris claims Social Security at 70 to maximize
the household's survivor benefit; Pat claims early at 62 to provide near-term income while
the portfolio seasons.

This case is used to illustrate the spending/shortfall efficient frontier concept: the
trade-off between committed first-year real spending and the expected shortfall when that
commitment proves too ambitious in some historical scenarios.
"""

[basic_info]
status = "married"
names = [ "Chris", "Pat",]
date_of_birth = [ "1963-01-15", "1966-01-15",]
life_expectancy = [ 89, 92,]
start_date = "2026-01-01"

[savings_assets]
taxable_savings_balances = [ 100.0, 50.0,]
tax_deferred_savings_balances = [ 700.0, 150.0,]
tax_free_savings_balances = [ 70.0, 40.0,]
hsa_savings_balances = [ 0.0, 0.0,]
beneficiary_fractions = [ 1.0, 1.0, 1.0, 1.0,]
spousal_surplus_deposit_fraction = 0.5

[household_financial_profile]
HFP_file_name = "HFP_chris+pat.xlsx"

[fixed_income]
pension_monthly_amounts = [ 0.0, 0.0,]
pension_ages = [ 65.0, 65.0,]
pension_indexed = [ false, false,]
pension_survivor_fraction = [ 0.0, 0.0,]
social_security_pia_amounts = [ 2000, 1400,]
social_security_ages = [ 70.0, 62.0,]

[rates_selection]
heirs_rate_on_tax_deferred_estate = 30.0
dividend_rate = 1.7
obbba_expiration_year = 2032
method = "historical"
from = 1969
to = 2001

[asset_allocation]
interpolation_method = "s-curve"
interpolation_center = 15.0
interpolation_width = 5.0
type = "individual"
generic = [ [ [ 60, 40, 0, 0,], [ 60, 40, 0, 0,],], [ [ 60, 40, 0, 0,], [ 60, 40, 0, 0,],],]

[optimization_parameters]
spending_profile = "flat"
surviving_spouse_spending_percent = 60
objective = "maxSpending"

[solver_options]
maxRothConversion = 100
noRothConversions = "none"
startRothConversions = 2026
withSCLoop = true
withMedicare = "loop"
bequest = 400
solver = "default"
spendingSlack = 0

[results]
default_plots = "today"
