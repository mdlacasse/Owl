case_name = "chris+pat"
description = "Chris and Pat are a married couple in their early sixties, a few years from retirement. Chris, the older of the two, wraps up a full-time career in engineering at the end of 2027 at age 64, just as Medicare eligibility begins. Pat, a marketing professional, continues working through 2028, retiring at 62. They own their home outright and plan to leave it to their heirs.\n\nTheir nest egg is spread across taxable, traditional IRA, and Roth accounts, with the bulk in Chris's traditional IRA—a reflection of decades of 401(k) contributions. Owl will optimize Roth conversions in the early retirement years, before Social Security and RMDs begin, to reduce long-term tax exposure. Chris claims Social Security at 70 to maximize the household's survivor benefit; Pat claims early at 62 to provide near-term income while the portfolio seasons. These claiming ages were selected using Owl's SS age optimizer in a preliminary run.\n\nThis case is used to illustrate the spending/shortfall efficient frontier concept: the trade-off between committed first-year real spending and the expected shortfall when that commitment proves too ambitious in some historical scenarios.\n"

