case_name = "morgan"
description = """
Morgan is a 54-year-old single professional who retired in early 2026. Morgan has built moderate savings across taxable, tax-deferred, and Roth accounts. With 11 years until Medicare (age 65), Morgan must obtain health insurance through the ACA marketplace. This case highlights Owl's ACA marketplace modeling: the optimizer accounts for Premium Tax Credits when MAGI falls within subsidy-eligible ranges (roughly 100%–400% of federal poverty level) and adjusts Roth conversion and withdrawal timing accordingly.

Key features: pre-65 ACA costs with SLCSP benchmark premium, subsidy-aware income optimization, and the trade-off between Roth conversions (higher MAGI, lower ACA subsidy) versus tax-deferred withdrawals.
"""

[basic_info]
status = "single"
names = [ "Morgan",]
date_of_birth = [ "1972-01-15",]
life_expectancy = [ 92,]
start_date = "2026-01-01"

[savings_assets]
taxable_savings_balances = [ 85.0,]
tax_deferred_savings_balances = [ 520.0,]
tax_free_savings_balances = [ 45.0,]
hsa_savings_balances = [ 8.0,]

[household_financial_profile]
HFP_file_name = "HFP_morgan.xlsx"

[fixed_income]
pension_monthly_amounts = [ 0,]
pension_ages = [ 65.0,]
pension_indexed = [ false,]
social_security_pia_amounts = [ 2100,]
social_security_ages = [ 67.0,]

[rates_selection]
heirs_rate_on_tax_deferred_estate = 30.0
dividend_rate = 1.8
obbba_expiration_year = 2032
method = "historical average"
from = 1990
to = 2025

[asset_allocation]
interpolation_method = "s-curve"
interpolation_center = 15.0
interpolation_width = 5.0
type = "individual"
generic = [ [ [ 60, 40, 0, 0,], [ 70, 30, 0, 0,],],]

[optimization_parameters]
spending_profile = "smile"
surviving_spouse_spending_percent = 60
smile_dip = 15
smile_increase = 12
smile_delay = 0
objective = "maxSpending"

[aca_settings]
slcsp_annual = 14.0

[solver_options]
maxRothConversion = 50
startRothConversions = 2026
bequest = 75
withSCLoop = true
withMedicare = "loop"
withACA = "loop"
solver = "default"

[results]
default_plots = "today"
