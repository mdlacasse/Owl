case_name = "kim+sam-bequest"
description = """
Kim and Sam want to maximize the after-tax estate they leave to their heirs while maintaining a fixed $145k annual spending floor. Like the spending variant, they have HSAs and plan to downsize their home in 2038.

This case demonstrates maxBequest optimization: the solver balances Roth conversions (to reduce future RMDs and heirs' tax burden) against the need to preserve liquidity for spending. Fixed assets and HSA qualified withdrawals add complexity to the tax-efficient withdrawal sequence.
"""

[basic_info]
status = "married"
names = [ "Kim", "Sam",]
date_of_birth = [ "1964-01-15", "1965-01-15",]
life_expectancy = [ 89, 93,]
start_date = "2026-01-01"

[savings_assets]
taxable_savings_balances = [ 650.0, 250.0,]
tax_deferred_savings_balances = [ 1500.0, 500.0,]
tax_free_savings_balances = [ 60.0, 40.0,]
hsa_savings_balances = [ 35.0, 28.0,]
beneficiary_fractions = [ 1.0, 1.0, 1.0,]
spousal_surplus_deposit_fraction = 0.5

[household_financial_profile]
HFP_file_name = "HFP_kim+sam.xlsx"

[fixed_income]
pension_monthly_amounts = [ 0, 0,]
pension_ages = [ 65.0, 65.0,]
pension_indexed = [ false, false,]
social_security_pia_amounts = [ 3500, 2000,]
social_security_ages = [ 70.0, 68.0,]

[rates_selection]
heirs_rate_on_tax_deferred_estate = 33.0
dividend_rate = 1.75
obbba_expiration_year = 2032
method = "user"
values = [ 6.0, 4.0, 3.3, 2.8,]
from = 1928
to = 2024

[asset_allocation]
interpolation_method = "s-curve"
interpolation_center = 15.0
interpolation_width = 5.0
type = "individual"
generic = [ [ [ 60, 40, 0, 0,], [ 60, 40, 0, 0,],], [ [ 60, 40, 0, 0,], [ 60, 40, 0, 0,],],]

[optimization_parameters]
spending_profile = "flat"
surviving_spouse_spending_percent = 60
smile_dip = 15
smile_increase = 12
smile_delay = 0
objective = "maxBequest"

[solver_options]
netSpending = 145
maxRothConversion = 100
noRothConversions = "none"
startRothConversions = 2026
solver = "default"
spendingSlack = 0
withSCLoop = true
withMedicare = "loop"

[results]
default_plots = "today"
