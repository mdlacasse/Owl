case_name = "jordan+taylor"
description = """
Jordan and Taylor are a high-net-worth couple—roughly $8M across taxable, tax-deferred, Roth, and HSA accounts—optimizing to maximize the estate they leave to heirs (Taylor inherits in full; other beneficiaries share Jordan's accounts). This is Owl's stress-test of its real-estate and high-income machinery: the couple buys a $1.2M lake house in 2028 (partly financed with a $400k mortgage), sells an Apple stock position in 2030, and sells the primary residence in 2040, all while previous MAGIs are deliberately seeded at the top of the IRMAA brackets to push Medicare surcharges to their ceiling.

The optimization is aggressive and the numbers are large: Owl converts about $979k (today's dollars) to Roth so that roughly $2.36M passes to heirs entirely tax-free, lifting the after-tax legacy to about $2.63M. At this income level the secondary taxes all engage—Net Investment Income Tax, top-tier Medicare premiums near $265k, and—because they retire in Minnesota—about $425k of state income tax over the plan.

This case demonstrates fixed-asset purchases and dispositions, debt, IRMAA at the high end, NIIT, and large-scale Roth conversion for bequest maximization. It is also used in the test suite as a complex, slow-converging MILP.
"""

[basic_info]
status = "married"
names = [ "Jordan", "Taylor",]
sexes = [ "M", "F",]
date_of_birth = [ "1959-01-15", "1960-01-15",]
life_expectancy = [ 92, 93,]
start_date = "2026-01-01"
state = "MN"

[savings_assets]
taxable_savings_balances = [ 1_000.0, 100.0,]
tax_deferred_savings_balances = [ 4_000.0, 750.0,]
tax_free_savings_balances = [ 2_000.0, 50.0,]
hsa_savings_balances = [ 50.0, 0.0,]
beneficiary_fractions = [ 0.28, 0.28, 0.28, 1.0,]
spousal_surplus_deposit_fraction = 0.0

[household_financial_profile]
HFP_file_name = "HFP_jordan+taylor.xlsx"

[fixed_income]
pension_monthly_amounts = [ 1_000, 0,]
pension_ages = [ 65.0, 65.0,]
pension_indexed = [ true, false,]
pension_survivor_fraction = [ 0.5, 0.0,]
social_security_pia_amounts = [ 3_500, 2_000,]
social_security_ages = [ 70.0, 62.75,]

[rates_selection]
heirs_rate_on_tax_deferred_estate = 33.0
dividend_rate = 1.7
obbba_expiration_year = 2032
method = "user"
values = [ 6.5, 4.0, 3.3, 2.8,]
from = 1928
to = 2025
reverse_sequence = false
roll_sequence = 0

[asset_allocation]
interpolation_method = "s-curve"
interpolation_center = 15.0
interpolation_width = 6.0
type = "individual"
generic = [ [ [ 60.0, 20.0, 20.0, 0.0,], [ 70.0, 20.0, 10.0, 0.0,],], [ [ 60.0, 20.0, 20.0, 0.0,], [ 70.0, 20.0, 10.0, 0.0,],],]

[optimization_parameters]
spending_profile = "smile"
surviving_spouse_spending_percent = 60
objective = "maxBequest"
smile_dip = 15
smile_increase = 12
smile_delay = 0

[solver_options]
netSpending = 240.0
maxRothConversion = 400.0
noRothConversions = "Taylor"
startRothConversions = 2026
solver = "default"
spendingSlack = 0
amoRoth = true
amoSurplus = true
withSCLoop = true
noLateSurplus = false
withMedicare = "loop"
withACA = "loop"
withLTCG = "loop"
withNIIT = "loop"
withDecomposition = "none"
withSSTaxability = 0.85
minTaxableBalance = [ 120.0, 0.0,]
previousMAGIs = [ 400.0, 420.0,]
gap = 0.003

[results]
default_plots = "today"
worksheet_show_ages = false
worksheet_hide_zero_columns = true
